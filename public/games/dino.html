<!DOCTYPE html>
<html>
<body style="background:white;text-align:center">
<h1>Dino Run</h1>
<canvas id="game" width="600" height="200"></canvas>

<script>
let dino = {y:150,vy:0};
let gravity = 0.6;

function update(){
  dino.vy += gravity;
  dino.y += dino.vy;
  if(dino.y > 150){ dino.y = 150; dino.vy = 0; }
}

document.addEventListener("keydown", () => {
  if(dino.y >=150) dino.vy = -10;
});

function draw(){
  const c = document.getElementById("game");
  const ctx = c.getContext("2d");
  ctx.clearRect(0,0,600,200);
  ctx.fillRect(50,dino.y,20,20);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
