<!DOCTYPE html>
<html>
<body style="background:#5c94fc;text-align:center">
<h1>Monet Maker</h1>
<canvas id="game" width="600" height="300"></canvas>

<script>
let player = {x:50,y:250,vy:0};
let gravity = 0.5;

document.addEventListener("keydown", e=>{
  if(e.key===" " && player.y>=250) player.vy=-10;
});

function update(){
  player.vy+=gravity;
  player.y+=player.vy;
  if(player.y>250){player.y=250;player.vy=0;}
}

function draw(){
  const c=document.getElementById("game");
  const ctx=c.getContext("2d");
  ctx.clearRect(0,0,600,300);
  ctx.fillStyle="red";
  ctx.fillRect(player.x,player.y,20,20);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
