<!-- START LIBRA AIRDROP DASHBOARD -->
<section id="airdropDashboard" style="margin-top:30px;padding:30px;background:#1a1a1a;color:white;border-radius:12px;font-family:sans-serif;">
  <h2 style="margin-bottom:15px;text-align:center;">LIBRA Airdrop Dashboard</h2>
  <div style="display:flex;justify-content:center;align-items:center;gap:25px;flex-wrap:wrap;">
    <img src="images/libra.png" alt="LIBRA Token" style="width:90px;border-radius:50%;animation:spin 4s linear infinite;">
    <div style="text-align:left;min-width:200px;">
      <p style="font-size:16px;">Token Price (SOL): <span id="libraPrice">Loading...</span></p>
      <p style="font-size:16px;">Tokens Claimed: <span id="airdropClaimed">0</span></p>
      <p style="font-size:16px;">Tokens Remaining: <span id="airdropRemaining">0</span></p>
      <button id="claimAirdrop" style="padding:12px 22px;margin-top:8px;font-size:16px;background:#ffd700;border:none;border-radius:6px;cursor:pointer;">Claim Airdrop</button>
      <p id="claimStatus" style="margin-top:8px;color:#00ffea;"></p>
    </div>
  </div>
</section>
<!-- END LIBRA AIRDROP DASHBOARD -->
