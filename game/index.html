<!DOCTYPE html>
<html>
<head>
  <title>Monet Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background:#0b0b0f;
      color:#00ffa3;
      font-family:Orbitron,sans-serif;
      text-align:center;
      padding:20px;
    }
    button {
      background:#00ffa3;
      color:#000;
      border:none;
      padding:15px;
      margin:10px;
      border-radius:10px;
      font-size:18px;
    }
  </style>
</head>
<body>

<h1>💵 Monet Tap Duel</h1>

<p id="wallet">Not connected</p>
<button onclick="connectWallet()">Connect Wallet</button>

<br>

<button onclick="startGame(1,10)">🟢 Basic (1 MONET)</button><br>
<button onclick="startGame(5,50)">🔵 Pro (5 MONET)</button><br>
<button onclick="startGame(10,100)">💎 Whale (10 MONET)</button>

<h2 id="timer">10</h2>
<h2 id="score">Score: 0</h2>

<button id="tapBtn" onclick="tap()" disabled>TAP</button>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<h3>🎁 Referral</h3>
<input id="refLink" style="width:80%" readonly>
<button onclick="copyRef()">Copy</button>

<script>
let wallet = null;
let score = 0;
let timeLeft = 10;
let interval;

// ---------- WALLET ----------
async function connectWallet() {
  if (!window.solana) return alert("Install Phantom");

  const resp = await window.solana.connect();
  wallet = resp.publicKey.toString();

  document.getElementById("wallet").innerText = wallet;

  generateRef();
}

// ---------- PAYMENT ----------
async function payMonet(amount) {
  if (!window.solana) return alert("Install Phantom");

  const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

  const user = window.solana.publicKey;
  const treasury = new solanaWeb3.PublicKey("BmEAUUkKcj7BLNAxTF6wqFx6r25wbX5josw4voMbin9z");

  const mint = new solanaWeb3.PublicKey("6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b");

  // Associated Token Accounts
  const getATA = async (owner) => {
    return await solanaWeb3.PublicKey.findProgramAddressSync(
      [
        owner.toBuffer(),
        new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA").toBuffer(),
        mint.toBuffer()
      ],
      new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL")
    )[0];
  };

  const userATA = await getATA(user);
  const treasuryATA = await getATA(treasury);

  const tx = new solanaWeb3.Transaction();

  const data = new Uint8Array([3, ...new Uint8Array(new BigUint64Array([1000000000n]).buffer)]);

  tx.add(new solanaWeb3.TransactionInstruction({
    keys: [
      { pubkey: userATA, isSigner: false, isWritable: true },
      { pubkey: treasuryATA, isSigner: false, isWritable: true },
      { pubkey: user, isSigner: true, isWritable: false }
    ],
    programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"),
    data: data
  }));

  tx.feePayer = user;
  tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;

  const signed = await window.solana.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  await connection.confirmTransaction(sig);

  return sig;
}
async function payMonet(amount) {
  const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

  const mint = new solanaWeb3.PublicKey("6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b");
  const treasury = new solanaWeb3.PublicKey("BmEAUUkKcj7BLNAxTF6wqFx6r25wbX5josw4voMbin9z");

  const tx = new solanaWeb3.Transaction();

  // ⚠️ simplified transfer (native SOL fallback if needed)
  tx.add(
    solanaWeb3.SystemProgram.transfer({
      fromPubkey: window.solana.publicKey,
      toPubkey: treasury,
      lamports: 1000000 // placeholder
    })
  );

  const signed = await window.solana.signAndSendTransaction(tx);
  await connection.confirmTransaction(signed.signature);
}

// ---------- GAME ----------
async function startGame(entry, required) {
  if (!wallet) return alert("Connect wallet");

  if (monetBalance < required) {
    alert("You need at least " + required + " MONET to play this tier.");
    return;
  }

  try {
    await payMonet(entry);
  } catch(e) {
    alert("Payment failed");
    return;
  }

  if (!wallet) return alert("Connect wallet");

  try {
    await payMonet();
  } catch(e) {
    alert("Payment failed");
    return;
  }

  score = 0;
  timeLeft = 10;

  document.getElementById("tapBtn").disabled = false;

  interval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(interval);
      endGame();
    }
  }, 1000);
}

function tap() {
  score++;
  document.getElementById("score").innerText = "Score: " + score;
}

function endGame() {
  document.getElementById("tapBtn").disabled = true;

  let lb = JSON.parse(localStorage.getItem("leaderboard") || "[]");

  lb.push({ wallet, score });

  lb.sort((a,b)=>b.score-a.score);
  lb = lb.slice(0,10);

  localStorage.setItem("leaderboard", JSON.stringify(lb));

  renderLeaderboard();
}

// ---------- LEADERBOARD ----------
function renderLeaderboard() {
  let lb = JSON.parse(localStorage.getItem("leaderboard") || "[]");

  document.getElementById("leaderboard").innerHTML =
    lb.map((p,i)=>`<p>#${i+1} ${p.wallet.slice(0,4)}... ${p.score}</p>`).join("");
}

setInterval(renderLeaderboard, 3000);

// ---------- REFERRAL ----------
function generateRef() {
  const link = window.location.origin + "/game/?ref=" + wallet;
  document.getElementById("refLink").value = link;
}

function copyRef() {
  const input = document.getElementById("refLink");
  input.select();
  document.execCommand("copy");
  alert("Copied!");
}
</script>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

</body>
</html>
