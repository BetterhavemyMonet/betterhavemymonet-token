<!DOCTYPE html>
<html>
<head>
  <title>MONET Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      background:#0a0014;
      color:#00ffa3;
      font-family:Arial;
      text-align:center;
    }

    h1 {
      margin:15px 0;
    }

    #gameContainer {
      width:100%;
      height:80vh;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
    }

    button {
      padding:12px 18px;
      margin:10px;
      border:none;
      border-radius:10px;
      background:#00ffa3;
      color:#000;
      font-weight:bold;
    }
  </style>
</head>
<body>

<h1>🕹️ MONET Arcade</h1>

<p>Select a game to play</p>

<div>
  <button onclick="loadGame('mario')">🍄 Mario</button>
  <button onclick="loadGame('tetris')">🧱 Tetris</button>
</div>

<div id="gameContainer"></div>

<script>
function loadGame(game){
  let url = "";

  if(game === "mario"){
    url = "https://www.retrogames.cc/embed/42063-super-mario-bros.html";
  }

  if(game === "tetris"){
    url = "https://www.retrogames.cc/embed/41235-tetris.html";
  }

  document.getElementById("gameContainer").innerHTML =
    '<iframe src="'+url+'" allowfullscreen></iframe>';
}
</script>

</body>
</html>
