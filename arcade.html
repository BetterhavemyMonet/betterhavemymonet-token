<!DOCTYPE html>
<html>
<head>
  <title>MONET Arcade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      background:#0a0014;
      color:#00ffa3;
      font-family:Arial;
      text-align:center;
    }

    h1 { margin:15px 0; }

    #gameContainer {
      width:100%;
      height:80vh;
    }

    iframe {
      width:100%;
      height:100%;
      border:none;
    }

    button {
      padding:14px 20px;
      margin:10px;
      border:none;
      border-radius:12px;
      background:#00ffa3;
      color:#000;
      font-weight:bold;
      font-size:16px;
    }

    #locked {
      margin-top:40px;
      color:#aaa;
    }
  </style>
</head>
<body>

<h1>🕹️ MONET Arcade</h1>
<p>Unlock games using MONET</p>

<div>
  <button onclick="startGame('mario')">🍄 Mario</button>
  <button onclick="startGame('tetris')">🧱 Tetris</button>
</div>

<div id="locked">🔒 Games require MONET to play</div>

<div id="gameContainer"></div>

<script>
function startGame(game){
  const swapUrl = "https://jup.ag/swap/SOL-6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b";

  // Step 1: open Jupiter
  window.open(swapUrl, "_blank");

  // Step 2: confirm
  const ok = confirm("After getting MONET, click OK to unlock the game.");

  if(!ok) return;

  loadGame(game);
}

function loadGame(game){
  let url = "";

  if(game === "mario"){
    url = "https://www.retrogames.cc/embed/42063-super-mario-bros.html";
  }

  if(game === "tetris"){
    url = "https://www.retrogames.cc/embed/41235-tetris.html";
  }

  document.getElementById("locked").innerText = "✅ Unlocked";

  document.getElementById("gameContainer").innerHTML =
    '<iframe src="'+url+'" allowfullscreen></iframe>';
}
</script>

</body>
</html>
