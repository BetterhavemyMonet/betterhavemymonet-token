<!DOCTYPE html>
<html>
<head>
  <title>Monet Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background:radial-gradient(circle,#0b0b0f,#1a0033);
      color:#00ffa3;
      font-family:Orbitron, Arial;
      text-align:center;
      padding:40px;
    }
    button {
      padding:15px 20px;
      margin:10px;
      font-size:18px;
      border:none;
      border-radius:10px;
      background:#00ffa3;
      color:#000;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>💵 Monet Tap Game</h1>

<button id="startBtn">Start Game</button>

<h2 id="timer">10</h2>
<h2 id="score">Score: 0</h2>

<button id="tapBtn" disabled>TAP</button>

<script>
let score = 0;
let timeLeft = 10;
let interval;

document.getElementById("startBtn").onclick = function() {
  score = 0;
  timeLeft = 10;

  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("tapBtn").disabled = false;

  interval = setInterval(function(){
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(interval);
      document.getElementById("tapBtn").disabled = true;
      alert("Game Over! Score: " + score);
    }
  }, 1000);
};

document.getElementById("tapBtn").onclick = function() {
  score++;
  document.getElementById("score").innerText = "Score: " + score;
};
</script>

</body>
</html>

<script>
var wallet = null;

function getProvider() {
  return window.phantom && window.phantom.solana
    ? window.phantom.solana
    : window.solana || null;
}

function connectWallet() {
  var provider = getProvider();

  if (!provider) {
    alert("Open inside Phantom wallet");
    return;
  }

  provider.connect().then(function(res){
    wallet = res.publicKey.toString();
    document.getElementById("walletText").innerText = wallet;
  }).catch(function(){
    alert("Connection failed");
  });
}

// Inject UI safely
document.body.insertAdjacentHTML("afterbegin",
  '<p id="walletText">Not connected</p>' +
  '<button onclick="connectWallet()">Connect Wallet</button><br><br>'
);
</script>


<script>
function getProvider() {
  if (window.phantom && window.phantom.solana) return window.phantom.solana;
  if (window.solana) return window.solana;
  return null;
}

}
</script>

<script>
async function payToPlay() {
  const provider = window.phantom?.solana || window.solana;
  if (!provider) {
    alert("Wallet not found");
    return false;
  }

  const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

  const tx = new solanaWeb3.Transaction().add(
    solanaWeb3.SystemProgram.transfer({
      fromPubkey: provider.publicKey,
      toPubkey: new solanaWeb3.PublicKey("BmEAUUkKcj7BLNAxTF6wqFx6r25wbX5josw4voMbin9z"),
      lamports: 10000 // tiny amount for testing
    })
  );

  tx.feePayer = provider.publicKey;
  tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;

  const signed = await provider.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  await connection.confirmTransaction(sig);

  return true;
}

// Override start again (payment + game)
document.getElementById("startBtn").onclick = async function() {
  if (!wallet) {
    alert("Connect wallet first");
    return;
  }

  try {
    await payToPlay();
  } catch (e) {
    alert("Payment failed");
    return;
  }

  score = 0;
  timeLeft = 10;

  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("tapBtn").disabled = false;

  interval = setInterval(function(){
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(interval);
      document.getElementById("tapBtn").disabled = true;
      alert("Game Over! Score: " + score);
    }
  }, 1000);
};
</script>

<script>
function saveScore(score) {
  let scores = JSON.parse(localStorage.getItem("monetScores") || "[]");

  scores.push({ score: score, time: Date.now() });

  scores.sort((a,b)=>b.score-a.score);
  scores = scores.slice(0,5);

  localStorage.setItem("monetScores", JSON.stringify(scores));
  renderLeaderboard();
}

function renderLeaderboard() {
  let scores = JSON.parse(localStorage.getItem("monetScores") || "[]");

  let html = "<h3>🏆 Top Scores</h3>";
  scores.forEach((s,i)=>{
    html += `<p>#${i+1} - ${s.score}</p>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

document.body.insertAdjacentHTML("beforeend", '<div id="leaderboard"></div>');
renderLeaderboard();
</script>


<script>
async function payWithMonet(amount) {
  const provider = window.phantom?.solana || window.solana;
  if (!provider) {
    alert("Wallet not found");
    return false;
  }

  const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

  const user = provider.publicKey;
  const treasury = new solanaWeb3.PublicKey("BmEAUUkKcj7BLNAxTF6wqFx6r25wbX5josw4voMbin9z");
  const mint = new solanaWeb3.PublicKey("6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b");

  const TOKEN_PROGRAM = new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA");
  const ATA_PROGRAM = new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL");

  function getATA(owner) {
    return solanaWeb3.PublicKey.findProgramAddressSync(
      [owner.toBuffer(), TOKEN_PROGRAM.toBuffer(), mint.toBuffer()],
      ATA_PROGRAM
    )[0];
  }

  const userATA = getATA(user);
  const treasuryATA = getATA(treasury);

  const amountRaw = BigInt(amount) * 1000000000n; // 9 decimals

  const data = new Uint8Array([
    3,
    ...new Uint8Array(new BigUint64Array([amountRaw]).buffer)
  ]);

  const tx = new solanaWeb3.Transaction().add(
    new solanaWeb3.TransactionInstruction({
      keys: [
        { pubkey: userATA, isSigner: false, isWritable: true },
        { pubkey: treasuryATA, isSigner: false, isWritable: true },
        { pubkey: user, isSigner: true, isWritable: false }
      ],
      programId: TOKEN_PROGRAM,
      data: data
    })
  );

  tx.feePayer = user;
  tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;

  const signed = await provider.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  await connection.confirmTransaction(sig);

  return true;
}
</script>


<script src="https://unpkg.com/@solana/spl-token@latest/lib/index.iife.js"></script>

<script>
async function payWithMonet(amount) {
  const provider = window.phantom?.solana || window.solana;
  if (!provider) {
    alert("Wallet not found");
    return false;
  }

  const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

  const user = provider.publicKey;
  const treasury = new solanaWeb3.PublicKey("BmEAUUkKcj7BLNAxTF6wqFx6r25wbX5josw4voMbin9z");
  const mint = new solanaWeb3.PublicKey("6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b");

  const userATA = await splToken.getAssociatedTokenAddress(mint, user);
  const treasuryATA = await splToken.getAssociatedTokenAddress(mint, treasury);

  const tx = new solanaWeb3.Transaction();

  // Create treasury ATA if missing
  const treasuryInfo = await connection.getAccountInfo(treasuryATA);
  if (!treasuryInfo) {
    tx.add(
      splToken.createAssociatedTokenAccountInstruction(
        user,
        treasuryATA,
        treasury,
        mint
      )
    );
  }

  // Transfer MONET
  tx.add(
    splToken.createTransferInstruction(
      userATA,
      treasuryATA,
      user,
      amount * 1_000_000_000 // 9 decimals
    )
  );

  tx.feePayer = user;
  tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;

  const signed = await provider.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  await connection.confirmTransaction(sig);

  return true;
}
</script>
