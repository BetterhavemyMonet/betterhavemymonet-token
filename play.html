<!DOCTYPE html>
<html>
<head>
  <title>MONET Play</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:#0b0b0f; }
    canvas { width:100vw; height:100vh; display:block; background:#111; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const params = new URLSearchParams(window.location.search);
let level = JSON.parse(atob(params.get("level") || "W10=")); // fallback

let player = {x:80,y:300,w:25,h:25};
let velocity = 0;
let gravity = 0.5;
let scroll = 0;
let groundY = canvas.height - 120;
let playing = true;
let score = 0;

function jump(){
  if (player.y >= groundY) velocity = -12;
}

canvas.addEventListener("click", jump);

function loop(){
  if (!playing) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  velocity += gravity;
  player.y += velocity;

  if (player.y >= groundY) {
    player.y = groundY;
    velocity = 0;
  }

  ctx.fillStyle="#00ffa3";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  scroll += 6;
  score++;

  ctx.fillStyle="#fff";
  ctx.fillText("Score: "+score,20,30);

  level.forEach((b,i)=>{
    if (!b) return;

    let x = i*60 - scroll;
    let y = groundY;

    ctx.fillStyle="#ff0040";
    ctx.fillRect(x,y,30,30);

    if (
      player.x < x+30 &&
      player.x+player.w > x &&
      player.y < y+30 &&
      player.y+player.h > y
    ){
      playing = false;
      alert("Game Over! Score: "+score);
    }
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
