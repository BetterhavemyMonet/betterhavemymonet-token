<!DOCTYPE html>
<html>
<head>
  <title>MONET Run</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:#0a0014; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const params = new URLSearchParams(window.location.search);
let level = JSON.parse(atob(params.get("level") || "W10="));

// --- PLAYER ---
let player = {x:100,y:canvas.height-120,w:30,h:30};
let velocity = 0;
let gravity = 0.6;
let groundY = canvas.height-120;

// --- GAME ---
let scroll = 0;
let score = 0;
let speed = 6;
let playing = true;

// jump
canvas.addEventListener("click", ()=>{
  if (player.y >= groundY) velocity = -13;
});

// loop
function loop(){
  if (!playing) return;

  // background
  ctx.fillStyle="#0a0014";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ground line
  ctx.strokeStyle="#00ffa3";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(0,groundY+30);
  ctx.lineTo(canvas.width,groundY+30);
  ctx.stroke();

  // player physics
  velocity += gravity;
  player.y += velocity;

  if (player.y >= groundY){
    player.y = groundY;
    velocity = 0;
  }

  // player (pixel style)
  ctx.fillStyle="#00ffa3";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // glow
  ctx.shadowBlur = 15;
  ctx.shadowColor = "#00ffa3";

  // movement
  scroll += speed;
  score++;

  // draw score
  ctx.shadowBlur = 0;
  ctx.fillStyle="#fff";
  ctx.font="20px monospace";
  ctx.fillText("Score: "+score,20,30);

  // obstacles
  level.forEach((b,i)=>{
    if (!b) return;

    let x = i*80 - scroll;
    let y = groundY;

    ctx.fillStyle="#ff0040";
    ctx.fillRect(x,y,30,30);

    // collision
    if (
      player.x < x+30 &&
      player.x+player.w > x &&
      player.y < y+30 &&
      player.y+player.h > y
    ){
      playing = false;
      setTimeout(()=>{
        alert("Game Over\nScore: "+score);
      },100);
    }
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
