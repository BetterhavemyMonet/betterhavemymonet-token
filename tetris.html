<!DOCTYPE html>
<html>
<head>
  <title>MONET Tetris</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
  <style>
    body { margin:0; background:#0a0014; color:#00ffa3; text-align:center; font-family:Arial; }
    canvas { display:block; margin:auto; background:#111; }
    button { padding:14px; margin:10px; border:none; border-radius:10px; background:#00ffa3; color:#000; font-weight:bold; }
  </style>
</head>
<body>

<h2>🧱 MONET Tetris</h2>

<button onclick="if(!window.solana){ openInWallet(); return; } startGameEngine()">▶️ Play (1 MONET)</button>

<p id="status">💰 Costs 1 MONET to play</p>
<canvas id="game" width="300" height="600"></canvas>
<p id="score">Score: 0</p>



<script>
const TOKEN = "6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b";
const TREASURY = "BmEAUUkKcj7BLNAxTF6wqFx6r25wbX5josw4voMbin9z";

function isInWallet(){
  return window.solana && window.solana.isPhantom;
}

function openWallet(){
  const url = window.location.href;
  document.body.innerHTML = "<h2 style=color:#00ffa3;text-align:center;margin-top:40px;>Opening Wallet...</h2>";
  window.location.href = "https://phantom.app/ul/browse/" + encodeURIComponent(url);
}

async function handlePlay(){
  console.log("PLAY CLICKED");

  if (!isInWallet()){
    openWallet();
    return;
  }

  try {
    const provider = window.solana;
    const resp = await provider.connect();

    alert("Wallet connected: " + resp.publicKey.toString());

    // TEMP: skip payment to confirm flow
    startGameEngine();

  } catch(e){
    console.log(e);
    alert("Wallet error");
  }
}

function startGameEngine(){
  alert("Game starting...");
}

document.addEventListener("DOMContentLoaded", function(){
  const btn = document.querySelector("button");
  if(btn){
    btn.onclick = handlePlay;
  } else {
    console.log("NO BUTTON FOUND");
  }
});
</script>

</body>
</html>

<style>
#walletLoader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0a0014;
  color: #00ffa3;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  font-size: 18px;
}

.loader {
  margin-top: 20px;
  border: 4px solid #222;
  border-top: 4px solid #00ffa3;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>

<div id="walletLoader">
  <div>🔗 Opening Wallet...</div>
  <div class="loader"></div>
</div>
