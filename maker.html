<!DOCTYPE html>
<html>
<head>
  <title>MONET Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#0b0b0f; color:#00ffa3; text-align:center; font-family:Arial; }
    #grid { display:grid; grid-template-columns:repeat(10,40px); gap:2px; justify-content:center; margin:20px; }
    .cell { width:40px; height:40px; background:#111; cursor:pointer; }
    .block { background:#00ffa3; }
    canvas { width:95vw; height:60vh; background:#111; display:block; margin:auto; }
    button { padding:10px; margin:5px; border:none; border-radius:8px; background:#00ffa3; color:#000; }
  </style>
</head>
<body>

<h1>🛠️ MONET Maker</h1>

<div id="grid"></div>

<button id="saveBtn">Save</button>
<button id="loadBtn">Load</button>
<button id="playBtn">Play</button>
