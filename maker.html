<!DOCTYPE html>
<html>
<head>
  <title>MONET Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#0b0b0f; color:#00ffa3; text-align:center; font-family:Arial; }
    #grid { display:grid; grid-template-columns:repeat(10,40px); gap:2px; justify-content:center; margin:20px; }
    .cell { width:40px; height:40px; background:#111; cursor:pointer; }
    .block { background:#00ffa3; }
    button { padding:12px; margin:6px; border:none; border-radius:10px; background:#00ffa3; color:#000; font-weight:bold; }
  </style>
</head>
<body>

<h1>🛠️ MONET Maker</h1>

<p>Tap squares to build your level</p>

<div id="grid"></div>

<div>
  <button id="saveBtn">Save</button>
  <button id="loadBtn">Load</button>
  <button id="playBtn">Play</button>
</div>

<script>
// --- LEVEL ---
let level = Array(100).fill(0);

// --- GRID ---
const grid = document.getElementById("grid");

for (let i=0;i<100;i++){
  const cell = document.createElement("div");
  cell.className="cell";

  cell.onclick = ()=>{
    level[i] = level[i] ? 0 : 1;
    cell.classList.toggle("block");
  };

  grid.appendChild(cell);
}

// --- RENDER ---
function render(){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    c.classList.toggle("block", level[i]);
  });
}

// --- SAVE ---
document.getElementById("saveBtn").onclick = ()=>{
  localStorage.setItem("monetLevel", JSON.stringify(level));
  alert("Saved");
};

// --- LOAD ---
document.getElementById("loadBtn").onclick = ()=>{
  const data = JSON.parse(localStorage.getItem("monetLevel")||"[]");
  if (!data.length) return;
  level = data;
  render();
};

// --- PLAY ---
document.getElementById("playBtn").onclick = ()=>{
  const encoded = btoa(JSON.stringify(level));
  window.location.href = "play.html?level=" + encoded;
};
</script>

</body>
</html>
