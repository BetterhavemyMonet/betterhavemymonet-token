<!DOCTYPE html>
<html>
<head>
  <title>MONET Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#0b0b0f; color:#00ffa3; text-align:center; font-family:Arial; }
    #grid { display:grid; grid-template-columns:repeat(10,40px); gap:2px; justify-content:center; margin:20px; }
    .cell { width:40px; height:40px; background:#111; cursor:pointer; }
    .block { background:#00ffa3; }
    button { padding:10px; margin:5px; border:none; border-radius:8px; background:#00ffa3; color:#000; }
    canvas { width:95vw; height:70vh; display:block; margin:10px auto; background:#111; }
  </style>
</head>
<body>

<h1>🛠️ MONET Maker</h1>

<div id="grid"></div>

<button onclick="saveLevel()">Save</button>
<button onclick="loadLevel()">Load</button>
<button onclick="playLevel()">Play</button>

<canvas id="game"></canvas></canvas>

<script>window.onerror=function(e){alert("JS ERROR: "+e)};
const grid = document.getElementById("grid");
let level = Array(100).fill(0);

// BUILD GRID
for (let i=0;i<100;i++){
  const cell = document.createElement("div");
  cell.className="cell";

  cell.onclick = (e) => {
    e.stopPropagation(); // 🔥 prevents freeze
    level[i] = level[i] ? 0 : 1;
    cell.classList.toggle("block");
  };

  grid.appendChild(cell);
}

// SAVE / LOAD
function saveLevel(){
  localStorage.setItem("monetLevel", JSON.stringify(level));
  alert("Saved");
}

function loadLevel(){
  const data = JSON.parse(localStorage.getItem("monetLevel")||"[]");
  if (!data.length) return;

  level = data;
  document.querySelectorAll(".cell").forEach((c,i)=>{
    c.classList.toggle("block", level[i]);
  });
}

// GAME
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = null;
let gravity = 0.5;
let scroll = 0;
let playing = false;

function playLevel(){
  player = {x:50,y:150,w:20,h:20,dy:0};
  scroll = 0;
  playing = true;
  loop();
}

// ONLY jump when clicking canvas
canvas.addEventListener("click", () => {
  if (playing && player) player.dy = -8;
});

function loop(){
  if (!playing) return;

  ctx.clearRect(0,0,400,300);

  player.dy += gravity;
  player.y += player.dy;

  ctx.fillStyle="#00ffa3";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  scroll += 2;

  level.forEach((b,i)=>{
    if (!b) return;

    let x = (i%10)*40 - scroll;
    let y = Math.floor(i/10)*40;

    ctx.fillStyle="#ff0040";
    ctx.fillRect(x,y,40,40);

    if (
      player.x < x+40 &&
      player.x+player.w > x &&
      player.y < y+40 &&
      player.y+player.h > y
    ){
      playing = false;
      alert("Game Over");
    }
  });

  requestAnimationFrame(loop);
}
</script>

</body>
</html>

<style>
#controls {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
}
.ctrl-btn {
  width:120px;
  height:120px;
  border-radius:50%;
  background:#00ffa3;
  color:#000;
  font-size:32px;
  border:none;
}
</style>

<div id="controls">
  <button class="ctrl-btn" id="jumpBtn">⬆️</button>
</div>

<script>
// Jump button control
document.getElementById("jumpBtn").addEventListener("touchstart", function(e){
  e.preventDefault();
  if (playing && player) player.dy = -8;
});

document.getElementById("jumpBtn").addEventListener("mousedown", function(){
  if (playing && player) player.dy = -8;
});
</script>
