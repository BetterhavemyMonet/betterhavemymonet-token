<!DOCTYPE html>
<html>
<head>
  <title>MONET Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#0b0b0f; color:#00ffa3; text-align:center; font-family:Arial; }
    #grid { display:grid; grid-template-columns:repeat(10,40px); gap:2px; justify-content:center; margin:20px; }
    .cell { width:40px; height:40px; background:#111; cursor:pointer; }
    .block { background:#00ffa3; }
    canvas { width:95vw; height:60vh; background:#111; display:block; margin:auto; }
    button { padding:10px; margin:5px; border:none; border-radius:8px; background:#00ffa3; color:#000; }
  </style>
</head>
<body>

<h1>🛠️ MONET Maker</h1>

<div id="grid"></div>

<button id="saveBtn">Save</button>
<button id="loadBtn">Load</button>
<button id="playBtn">Play</button>

<canvas id="game"></canvas>

<script>
// --- GRID ---
let pages = [Array(100).fill(0)];
let currentPage = 0;
let currentTool = "basic";

const grid = document.getElementById("grid");

for (let i=0;i<100;i++){
  const cell = document.createElement("div");
  cell.className="cell";

  cell.onclick = (e)=>{
    e.stopPropagation();
    pages[currentPage][i] = pages[currentPage][i] ? 0 : 1;
    cell.classList.toggle("block");
  };

  grid.appendChild(cell);
}

// --- SAVE / LOAD ---
function saveLevel(){
  localStorage.setItem("monetLevel", JSON.stringify(pages));
  alert("Saved");
}

function loadLevel(){
  const data = JSON.parse(localStorage.getItem("monetLevel")||"[]");
  if (!data.length) return;

  pages = data;
  renderPage();
}

function renderPage(){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    c.classList.toggle("block", pages[currentPage][i]);
  });
}

// --- GAME ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.6;

let player, velocity, playing, scroll, score;

function playLevel(){
  player = {x:80,y:300,w:25,h:25};
  velocity = 0;
  scroll = 0;
  score = 0;
  playing = true;
  loop();
}

// jump
canvas.addEventListener("click", ()=>{
  if (playing && player.y >= 300) velocity = -12;
});

function loop(){
  if (!playing) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  velocity += 0.5;
  player.y += velocity;

  if (player.y >= 300){
    player.y = 300;
    velocity = 0;
  }

  ctx.fillStyle="#00ffa3";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  scroll += 6;
  score++;

  ctx.fillStyle="#fff";
  ctx.fillText("Score: "+score,20,30);

  let full = pages.flat();

  full.forEach((b,i)=>{
    if (!b) return;

    let x = i*60 - scroll;
    let y = 300;

    ctx.fillStyle="#ff0040";
    ctx.fillRect(x,y,30,30);

    if (
      player.x < x+30 &&
      player.x+player.w > x &&
      player.y < y+30 &&
      player.y+player.h > y
    ){
      playing = false;
      alert("Game Over! Score: "+score);
    }
  });

  requestAnimationFrame(loop);
}

// --- BUTTONS ---
document.getElementById("saveBtn").onclick = saveLevel;
document.getElementById("loadBtn").onclick = loadLevel;
document.getElementById("playBtn").onclick = playLevel;

</script>

</body>
</html>
