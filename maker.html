<!DOCTYPE html>
<html>
<head>
  <title>MONET Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      background:#0b0b0f;
      color:#00ffa3;
      font-family:Arial;
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    h1 {
      text-align:center;
      margin:10px 0;
    }

    #grid {
      flex:1;
      display:grid;
      grid-template-columns:repeat(10,1fr);
      gap:3px;
      padding:10px;
    }

    .cell {
      background:#111;
      aspect-ratio:1;
    }

    .block {
      background:#00ffa3;
    }

    #controls {
      display:flex;
      justify-content:center;
      gap:10px;
      padding:10px;
      background:#111;
    }

    button {
      padding:12px 16px;
      border:none;
      border-radius:10px;
      background:#00ffa3;
      color:#000;
      font-weight:bold;
    }
  </style>
</head>
<body>

<h1>🛠️ MONET Maker</h1>

<div id="grid"></div>

<div id="controls">
  <button id="saveBtn">Save</button>
  <button id="loadBtn">Load</button>
  <button id="playBtn">Play</button>
</div>

<script>
let level = Array(100).fill(0);

const grid = document.getElementById("grid");

for (let i=0;i<100;i++){
  const cell = document.createElement("div");
  cell.className="cell";

  cell.onclick = ()=>{
    level[i] = level[i] ? 0 : 1;
    cell.classList.toggle("block");
  };

  grid.appendChild(cell);
}

function render(){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    c.classList.toggle("block", level[i]);
  });
}

document.getElementById("saveBtn").onclick = ()=>{
  localStorage.setItem("monetLevel", JSON.stringify(level));
  alert("Saved");
};

document.getElementById("loadBtn").onclick = ()=>{
  const data = JSON.parse(localStorage.getItem("monetLevel")||"[]");
  if (!data.length) return;
  level = data;
  render();
};

document.getElementById("playBtn").onclick = ()=>{
  const encoded = btoa(JSON.stringify(level));
  window.location.href = "play.html?level=" + encoded;
};
</script>

</body>
</html>
