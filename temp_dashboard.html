<section id="airdropDashboard" style="padding:60px;text-align:center;background:#111;color:white;position:relative;z-index:100;width:100%;box-sizing:border-box;">
  <h2 style="margin-bottom:20px;">LIBRA Airdrop Dashboard</h2>
  <div style="display:flex;justify-content:center;align-items:center;gap:30px;flex-wrap:wrap;position:relative;z-index:100;">
    <img src="images/libra.png" alt="LIBRA Token" style="width:100px;height:100px;border-radius:50%;animation:spin 4s linear infinite;z-index:100;">
    <div style="text-align:left;min-width:200px;">
      <p>LIBRA Token Price: <span id="libraPrice">Loading...</span> SOL</p>
      <p>Tokens claimed: <span id="airdropClaimed">0</span></p>
      <p>Tokens remaining: <span id="airdropRemaining">0</span></p>
      <button id="claimAirdrop" style="padding:10px 20px;margin-top:10px;font-size:16px;cursor:pointer;">Claim Airdrop</button>
      <p id="claimStatus" style="margin-top:10px;color:#ffd700"></p>
    </div>
  </div>
</section>
