<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monet Money</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bs58@5.0.0/dist/bs58.min.js"></script>

<style>
body {
  margin:0;
  font-family:'Fredoka',sans-serif;
  background: url("assets/background.png") no-repeat center center fixed;
  background-size:cover;
  color:white;
  text-align:center;
}

/* HERO */
.hero {
  padding:120px 20px 60px;
  backdrop-filter: blur(6px);
}

.logo {
  width:240px;
  margin-bottom:20px;
}

.title {
  font-size:56px;
  background:linear-gradient(135deg,#a855f7,#ec4899,#38bdf8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(56,189,248,0.4);
}

.desc {
  max-width:650px;
  margin:20px auto;
  font-size:18px;
}

/* BUTTONS */
.btn {
  margin:10px;
  padding:14px 26px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#a855f7,#ec4899,#38bdf8);
  color:white;
  animation:pulse 2s infinite;
}

.btn:hover { transform:scale(1.08); }

@keyframes pulse {
  0% { box-shadow:0 0 10px rgba(168,85,247,0.5); }
  50% { box-shadow:0 0 30px rgba(56,189,248,0.9); }
  100% { box-shadow:0 0 10px rgba(168,85,247,0.5); }
}

/* SECTION */
.section {
  padding:60px 20px;
  background:rgba(0,0,0,0.6);
  margin-top:20px;
}

.section h2 {
  margin-bottom:15px;
}

/* PROGRESS */
.progress {
  width:80%;
  margin:20px auto;
  background:#222;
  height:20px;
  border-radius:10px;
}

.progress-fill {
  height:100%;
  width:0%;
  background:linear-gradient(135deg,#38bdf8,#a855f7);
}

/* FLOATING */
.wallet {
  position:fixed;
  bottom:90px;
  left:20px;
  font-size:12px;
  opacity:.8;
}

.cta {
  position:fixed;
  right:20px;
  padding:12px 20px;
  border-radius:10px;
  font-weight:bold;
  text-decoration:none;
  z-index:999;
}

.cta-telegram {
  bottom:80px;
  background:linear-gradient(135deg,#a855f7,#ec4899,#38bdf8);
}

.cta-airdrop {
  bottom:20px;
  background:linear-gradient(135deg,#38bdf8,#a855f7);
}
</style>
</head>

<body>

<div class="hero">
  <img src="assets/monet.png" class="logo">
  <div class="title">Monet Money</div>

  <div class="desc">
    Make money moves by trading.<br><br>
    The next generation Solana token. Fast, secure, and building the future of decentralized finance.<br>
    For those who aren't made of money… better have your Monet.
  </div>

  <button class="btn" onclick="buy()">Make Money Moves</button>
  <button class="btn" onclick="claim()">Get Free MONET</button>
</div>

<div class="section">
  <h2>Token Info</h2>
  <p>Symbol: 💵 MONET<br>Supply: 1,000,000,000</p>
</div>

<div class="section">
  <h2>Chart</h2>
  <iframe src="https://dexscreener.com/solana/6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b"
  width="90%" height="400" style="border:none;"></iframe>
</div>

<div class="section">
  <h2>Airdrop Progress</h2>
  <div class="progress">
    <div class="progress-fill" id="fill"></div>
  </div>
  <div id="progressText"></div>
</div>

<div class="wallet" id="wallet"></div>

<a href="https://t.me/Libra_Token_Solana" class="cta cta-telegram">Join Telegram</a>
<button class="cta cta-airdrop" onclick="claim()">Get Free MONET</button>

<script>
async function getProvider(){
  if (getProvider()?.isPhantom) return getProvider();
  if (window.solflare) return window.solflare;
  if (window.backpack) return window.backpack;
  return null;
}

const API = "https://monetmoney-production.up.railway.app/airdrop";

/* BUY */
function buy(){
  window.open("https://jup.ag/swap/SOL-6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b","_blank");
}

/* CLAIM */
async function claim(){
  try{
    if(!getProvider()) return alert("Install Phantom");

    const resp = await (await getProvider()).connect();
    const wallet = resp.publicKey.toString();
    document.getElementById("wallet").innerText = wallet;

    const msg = new TextEncoder().encode("Claim MONET airdrop");
    const signed = await (await getProvider()).signMessage(msg);
    const sig = window.bs58.encode(signed.signature);

    const res = await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({wallet,signature:sig})
    });

    alert(await res.text());

  } catch(e){
    console.error(e);
    alert(await res.text());
  }
}

/* PROGRESS SIM */
let p=0;
setInterval(()=>{
  p+=Math.random()*2;
  if(p>100)p=100;
  document.getElementById("fill").style.width=p+"%";
  document.getElementById("progressText").innerText =
    Math.floor(p*100000) + " / 10,000,000 MONET claimed";
},2000);
</script>

<script>
let provider = null;

async function getProvider(){
  if (window.solana?.isPhantom) return window.solana;
  if (window.solflare) return window.solflare;
  if (window.backpack) return window.backpack;
  return null;
}

async function connectWallet(){
  provider = await getProvider();

  if (!provider){
    alert("Install Phantom, Solflare, or Backpack wallet");
    return null;
  }

  const resp = await provider.connect();
  const wallet = resp.publicKey.toString();

  const el = document.getElementById("wallet");
  if(el) el.innerText = wallet;

  return wallet;
}

async function claim(){
  try{
    const wallet = await connectWallet();
    if(!wallet) return;

    const msg = new TextEncoder().encode("Claim MONET airdrop");
    const signed = await provider.signMessage(msg, "utf8");

    const signature = window.bs58.encode(signed.signature);

    const res = await fetch("https://monetmoney-production.up.railway.app/airdrop",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ wallet, signature })
    });

    const text = await res.text();
    alert(text);

  } catch(e){
    console.error(e);
    alert("Airdrop failed");
  }
}

/* AUTO-WIRE BUTTON (no breaking changes) */
document.addEventListener("DOMContentLoaded", () => {
  const buttons = document.querySelectorAll("button");
  buttons.forEach(btn => {
    if(btn.innerText.toLowerCase().includes("free monet")){
      btn.onclick = claim;
    }
  });
});
</script>
</body>
</html>
