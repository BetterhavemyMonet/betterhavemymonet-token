<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monet Money</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  text-align:center;
}

.hero {
  padding:100px 20px 60px;
}

.title {
  font-size:52px;
  font-weight:700;
  background: linear-gradient(135deg,#00ffcc,#00aaff,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 25px rgba(0,255,200,0.25);
}

.desc {
  margin-top:15px;
  opacity:.85;
}

.btn {
  margin:10px;
  padding:14px 28px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background: linear-gradient(135deg,#00ffcc,#00aaff);
  color:#000;
  box-shadow:0 0 15px rgba(0,255,200,0.4);
  transition: transform .2s;
}
.btn:hover { transform: scale(1.05); }

.section {
  margin-top:40px;
  padding:40px 20px;
  background:rgba(255,255,255,0.03);
  border-top:1px solid rgba(255,255,255,0.08);
}

.token-box {
  margin-top:15px;
  padding:12px;
  background:#020617;
  border-radius:8px;
  font-size:14px;
  word-break:break-all;
}

.copy-btn {
  margin-top:10px;
  padding:8px 16px;
  background:#00ffaa;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">
  <div class="title">Monet Money</div>

  <div class="desc">
    Make Money Moves.<br>
    Built on Solana. Powered by Monet.
  </div>

  <button class="btn" onclick="buy()">Buy on Jupiter</button>
  <button class="btn" onclick="claim()">Claim Airdrop</button>
</div>

<div class="section">
  <h2>Token Info</h2>

  <div class="token-box" id="tokenAddress">
    6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b
  </div>

  <button class="copy-btn" onclick="copyToken()">Copy Address</button>

  <p>Supply: 1,000,000,000 MONET</p>
</div>

<div class="section">
  <h2>Chart</h2>
  <button class="btn" onclick="buy()">Open Jupiter Chart</button>
</div>

<script>
function buy() {
  window.open("https://jup.ag/swap/SOL-6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b", "_blank");
}

function claim() {
  window.open("https://monetmoney-production.up.railway.app/claim", "_blank");
}

function copyToken() {
  const text = document.getElementById("tokenAddress").innerText;
  navigator.clipboard.writeText(text);
  alert("Token address copied!");
}
</script>

</body>
</html>
