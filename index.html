<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monet Money</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,150,0.35), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(0,255,200,0.35), transparent 40%),
    #04040a;
  color: white;
  text-align: center;
}

/* sections */
section {
  padding: 60px 20px;
}

/* logo */
.logo {
  width: 140px;
  margin: 30px auto;
  display: block;
}

/* title */
h1 {
  font-size: 4rem;
  background: linear-gradient(180deg,#fff,#ff9df0,#00ffc8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow:
    0 0 10px #ff00cc,
    0 0 30px #ff00cc,
    0 0 60px #00ffc8;
}

/* cards */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
  backdrop-filter: blur(10px);
}

/* links */
a {
  color: #00ffc8;
  text-decoration: none;
}
</style>
</head>

<body>

<img src="assets/logo.png" class="logo">

<section>
<h1>Monet Money</h1>
<p>The future of digital currency.</p>
</section>

<section>
<div class="card">
<h2>Token Info</h2>
<p>Supply: 100,000,000</p>
<p>Network: Solana</p>
</div>

<div class="card">
<h2>Links</h2>
<p><a href="#">View on Explorer</a></p>
<p><a href="#">Trade</a></p>
</div>
</section>

</body>
</html>
