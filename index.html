<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background: radial-gradient(circle at top, #140028, #000);
  overflow-x:hidden;
}

/* Animated glow */
body::before {
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background: radial-gradient(circle, #8a2be2, transparent);
  top:-200px;
  left:-200px;
  filter:blur(120px);
  opacity:0.6;
}

body::after {
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background: radial-gradient(circle, #00d4ff, transparent);
  bottom:-200px;
  right:-200px;
  filter:blur(120px);
  opacity:0.6;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.btn {
  padding:10px 20px;
  border-radius:25px;
  border:none;
  background:linear-gradient(90deg,#8a2be2,#00d4ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
}

.logo {
  width:140px;
  border-radius:50%;
  box-shadow:0 0 40px #8a2be2;
}

h1 {
  font-size:3rem;
  background:linear-gradient(90deg,#8a2be2,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p {
  color:#bbb;
  max-width:400px;
  margin:auto;
}

/* CARDS */
.card {
  margin:20px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 20px #8a2be2;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:30px;
  color:#777;
}
</style>
</head>

</body>
