<!DOCTYPE html>
<html>
<head>
<title>BetterHaveMyMonet</title>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="app.js"></script>

<style>
body {
  margin:0;
  background: radial-gradient(circle at center,#050505,#000);
  color:white;
  font-family: 'Orbitron', sans-serif;
  overflow-x:hidden;
}

.glow {
  font-size:48px;
  text-align:center;
  margin-top:60px;
  background: linear-gradient(90deg,#00ffcc,#66ff99);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(0,255,150,0.4);
}

.sub {
  text-align:center;
  opacity:.8;
}

.center {
  text-align:center;
  margin-top:30px;
}

button {
  padding:14px 24px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  background:linear-gradient(135deg,#00ffcc,#33ff88);
  cursor:pointer;
}

.panel {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#000;
  padding:20px;
  border-radius:16px;
  box-shadow:0 0 25px rgba(0,255,150,0.3);
}

.feed {
  position:fixed;
  right:20px;
  bottom:20px;
  width:220px;
  background:#000;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(0,255,150,0.3);
  font-size:12px;
}
</style>
</head>

<body>

<h1 class="glow">Better Have My Monet</h1>
<p class="sub">Money Moves by trading with Monet Money</p>

<div class="center">
  <button onclick="connectWallet()">Connect Wallet</button>
</div>

<div class="center">
  <p>Wallet: <span id="wallet">Not Connected</span></p>
  <p>🎁 Spots Left: <span id="spots">500</span></p>
  <p>🏆 Your Rank: <span id="rank">-</span></p>
</div>

<div class="panel">
  <b>🚀 Early Access</b><br>
  First 500 wallets qualify<br>
  Stay connected 👀
</div>

<div class="feed" id="feed">
  <b>Live Activity</b>
</div>

</body>
</html>
