<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monet Money</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background: radial-gradient(circle at top, #140028, #000);
  overflow-x:hidden;
}

/* Animated glow */
body::before {
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background: radial-gradient(circle, #8a2be2, transparent);
  top:-200px;
  left:-200px;
  filter:blur(120px);
  opacity:0.6;
}

body::after {
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background: radial-gradient(circle, #00d4ff, transparent);
  bottom:-200px;
  right:-200px;
  filter:blur(120px);
  opacity:0.6;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.btn {
  padding:10px 20px;
  border-radius:25px;
  border:none;
  background:linear-gradient(90deg,#8a2be2,#00d4ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
}

.logo {
  width:140px;
  border-radius:50%;
  box-shadow:0 0 40px #8a2be2;
}

h1 {
  font-size:3rem;
  background:linear-gradient(90deg,#8a2be2,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p {
  color:#bbb;
  max-width:400px;
  margin:auto;
}

/* CARDS */
.card {
  margin:20px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 20px #8a2be2;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:30px;
  color:#777;
}
</style>
</head>

<body>

<div class="nav">
  <div><strong>Monet Money</strong></div>
  <button class="btn">Select Wallet</button>
</div>

<div class="hero">
  <img class="logo" src="https://beige-acute-krill-722.mypinata.cloud/ipfs/bafybeicdemlmg5iatjlspuozot2kzlsiadtb6mac7jm2oh63ysizmpxs4y">
  <h1>Monet Money</h1>
  <p>The future of decentralized finance on Solana. Fast. Secure. Unstoppable.</p>
  <br>
  <button class="btn">Buy Token</button>
</div>

<div class="card">📜 Contract: 9CHAHyqD...U7w7B5ZD</div>
<div class="card">📊 Live Chart (coming soon)</div>
<div class="card">🔄 Swap (coming soon)</div>
<div class="card">💰 Supply: 100M<br>⚡ Network: Solana<br>🔢 Decimals: 9</div>

<div class="footer">© 2025 Monet Money</div>

</body>
</html>
<style>
/* Dimensional glowing text for Monet Money */
h1 {
  font-size: 3rem;
  color: #fff;
  position: relative;
  text-transform: uppercase;
  font-weight: bold;
}

/* Layered neon effect */
h1::before {
  content: attr(data-text);
  position: absolute;
  top: 3px;
  left: 3px;
  z-index: -1;
  color: #8a2be2;
  filter: blur(4px);
}

h1::after {
  content: attr(data-text);
  position: absolute;
  top: 6px;
  left: 6px;
  z-index: -2;
  color: #00d4ff;
  filter: blur(8px);
}

/* Optional subtle glow */
h1 {
  text-shadow:
    0 0 5px #8a2be2,
    0 0 10px #8a2be2,
    0 0 20px #00d4ff,
    0 0 30px #00d4ff;
}
</style>
<style>
h1 {
  font-size: 3rem;
  color: #8a2be2; /* base purple */
  font-weight: bold;
  text-transform: uppercase;
  text-shadow: 
    0 0 3px #8a2be2,
    0 0 6px #00d4ff,
    0 0 10px #00d4ff;
  -webkit-text-stroke: 1px white; /* crisp white outline */
}
</style>
