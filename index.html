<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Better Have My MONET</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#000;
  color:#fff;
}

.pyramid {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-top:20px;
}

.money-icon {
  font-size:28px;
  margin-bottom:6px;
  filter: drop-shadow(0 0 6px rgba(255,230,140,0.8));
}

.hero-emblem {
  width:70px;
  margin:4px 0;
  filter: drop-shadow(0 0 10px rgba(0,255,180,0.4))
          drop-shadow(0 0 20px rgba(140,0,255,0.25));
}

.desc {
  text-align:center;
  line-height:1.6;
}

/* 💜 Purple base + 💚 emerald glow */
section {
  background: linear-gradient(145deg, rgba(40,0,60,0.6), rgba(10,0,30,0.8));
  box-shadow: 0 0 12px rgba(0,255,163,0.25), 0 0 24px rgba(0,255,163,0.15);
  border-radius: 12px;
  padding:30px;
  margin:30px;
  transition: all 0.3s ease;
}

section:hover {
  box-shadow: 0 0 20px rgba(0,255,163,0.45), 0 0 40px rgba(0,255,163,0.25);
  transform: translateY(-2px);
}

.button {
  display:inline-block;
  padding:16px 28px;
  font-size:18px;
  font-weight:700;
  background:linear-gradient(135deg,#00ffa3,#00cc88);
  color:#000;
  border-radius:14px;
  text-decoration:none;
  box-shadow:0 0 20px rgba(0,255,163,0.4);
}
</style>
</head>

<body>

<section>
  <div class="pyramid">
    <div class="money-icon">💵</div>
    <img src="/assets/monet.png" class="hero-emblem" />
    <p class="desc">Built on Solana. Powered by MONET.</p>
  </div>
</section>

<div style="text-align:center;margin:40px 0;">
  <a href="/maker.html" class="button">🎮 Play & Earn MONET</a>
</div>

</body>
</html>
