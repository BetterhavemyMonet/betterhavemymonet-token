<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monet Arcade</title>

<style>
body {
  margin:0;
  background:#000;
  color:#00ffc3;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  height:100dvh;
}

/* TOP */
.logo {
  width:100%;
  height:50vh;
  object-fit:contain;
  filter:drop-shadow(0 0 20px #00ffc3);
}

/* GAME */
.game-container {
  height:50vh;
  width:100%;
  position:relative;
  background:#111;
  overflow:hidden;
}

/* PLAYER */
.player {
  width:40px;
  height:40px;
  background:#00ffc3;
  position:absolute;
  bottom:0;
  left:50px;
  transition:bottom 0.2s;
}

/* CONTROLLER */
.controls {
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.ctrl-group {
  display:flex;
  gap:10px;
}

.ctrl-btn {
  width:60px;
  height:60px;
  background:rgba(0,255,200,0.2);
  border:2px solid #00ffc3;
  border-radius:12px;
  font-size:24px;
  color:#00ffc3;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<img src="monet-title.jpg" class="logo">

<div class="game-container" id="game">

  <div class="player" id="player"></div>

  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-btn" id="left">◀</div>
      <div class="ctrl-btn" id="right">▶</div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-btn" id="jump">⬆</div>
    </div>
  </div>

</div>

<script>
let player = document.getElementById("player");
let pos = 50;

// MOVE LEFT
document.getElementById("left").onclick = () => {
  pos -= 20;
  if(pos < 0) pos = 0;
  player.style.left = pos + "px";
};

// MOVE RIGHT
document.getElementById("right").onclick = () => {
  pos += 20;
  if(pos > window.innerWidth - 50) pos = window.innerWidth - 50;
  player.style.left = pos + "px";
};

// JUMP
document.getElementById("jump").onclick = () => {
  player.style.bottom = "120px";
  setTimeout(() => {
    player.style.bottom = "0px";
  }, 300);
};
</script>

</body>
</html>
