<!DOCTYPE html>
<html>
<head>
  <title>MONET Arcade 💰</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black;color:#00ffcc;text-align:center;font-family:sans-serif">

<h1>💰 MONET ARCADE</h1>

<button onclick="connectWallet()">🔌 Connect Wallet</button>
<p id="wallet"></p>
<p id="sol"></p>
<p id="monet"></p>

<hr>

<button onclick="play()">🎮 Play (Score 100)</button>
<button onclick="endGame()">🏁 End Game + Payout</button>

<p id="result"></p>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<script>
let walletAddress = "";

async function connectWallet() {
  const resp = await window.solana.connect();
  walletAddress = resp.publicKey.toString();

  document.getElementById("wallet").innerText = "Wallet: " + walletAddress;

  const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

  const solBalance = await connection.getBalance(resp.publicKey);
  document.getElementById("sol").innerText = "SOL: " + (solBalance / 1e9);

  // MONET balance
  const mint = new solanaWeb3.PublicKey("6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b");
  const tokenAccounts = await connection.getParsedTokenAccountsByOwner(resp.publicKey, { mint });

  let monet = 0;
  if (tokenAccounts.value.length > 0) {
    monet = tokenAccounts.value[0].account.data.parsed.info.tokenAmount.uiAmount;
  }

  document.getElementById("monet").innerText = "MONET: " + monet;
}

async function play() {
  const res = await fetch("https://monet-backend-95vi.onrender.com/enter?wallet=" + walletAddress + "&score=100");
  const data = await res.json();
  document.getElementById("result").innerText = JSON.stringify(data);
}

async function endGame() {
  const res = await fetch("https://monet-backend-95vi.onrender.com/end");
  const data = await res.json();
  document.getElementById("result").innerText = JSON.stringify(data);
}
</script>

</body>
</html>
