<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetterhavemyMonet Token</title>
<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at center, #1E1B4B, #312E81 60%, #000000 100%);
    color: #F5D06F;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 3rem 1rem 1rem;
    color: #F5D06F;
    text-shadow: 0 0 10px #F5D06F, 0 0 20px #1ED760;
  }
  h1 {
    font-size: 3rem;
    margin-bottom: 0.5rem;
  }
  h2 {
    font-size: 1.5rem;
    color: #1ED760; /* Monet Money glow */
  }
  .token-balance {
    margin: 2rem 0;
    padding: 1rem 2rem;
    border: 2px solid #1ED760;
    border-radius: 12px;
    box-shadow: 0 0 20px #1ED76044;
    font-size: 1.25rem;
  }
  .connect-wallet {
    background: linear-gradient(90deg, #312E81, #1E1B4B);
    border: none;
    padding: 1rem 2rem;
    border-radius: 8px;
    color: #F5D06F;
    font-size: 1.25rem;
    cursor: pointer;
    box-shadow: 0 0 15px #F5D06F66, 0 0 25px #1ED76044;
    transition: all 0.3s ease-in-out;
  }
  .connect-wallet:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #F5D06FAA, 0 0 40px #1ED760AA;
  }
</style>
</head>
<body>
<header>
  <h1>BetterhavemyMonet</h1>
  <h2>Libra ⚖️ & Monet Money 💵</h2>
</header>

<div class="token-balance" id="libraBalance">Libra Balance: 0</div>
<div class="token-balance" id="monetBalance">Monet Money Balance: 0</div>

<button class="connect-wallet" id="connectWalletBtn">Connect Phantom Wallet</button>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script>
  const LIBRA_MINT = "BYqHJvvtJSgXQi9iuL6PcXmVNADqBDxNGkyAhY8zwTWR";
  const MONET_MINT = "YourMonetMoneyMintAddressHere";

  let walletAddress = null;

  const connectWalletBtn = document.getElementById('connectWalletBtn');
  connectWalletBtn.addEventListener('click', async () => {
    if (window.solana && window.solana.isPhantom) {
      const resp = await window.solana.connect();
      walletAddress = resp.publicKey.toString();
      connectWalletBtn.innerText = `Connected: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
      updateBalances();
    } else {
      alert("Phantom Wallet not detected!");
    }
  });

  async function updateBalances() {
    if (!walletAddress) return;
    const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'));
    const libraBalance = await connection.getTokenAccountBalance(new solanaWeb3.PublicKey(LIBRA_MINT));
    const monetBalance = await connection.getTokenAccountBalance(new solanaWeb3.PublicKey(MONET_MINT));
    document.getElementById('libraBalance').innerText = `Libra Balance: ${libraBalance.value.uiAmount || 0}`;
    document.getElementById('monetBalance').innerText = `Monet Money Balance: ${monetBalance.value.uiAmount || 0}`;
  }
</script>
</body>
</html>
