<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monet Money</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bs58@5.0.0/dist/bs58.min.js"></script>

<style>
body {
  margin:0;
  font-family:"Fredoka",sans-serif;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

.container { padding:40px 20px; }

.monet {
  font-size:48px;
  background:linear-gradient(135deg,#a855f7,#ec4899,#38bdf8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BUTTONS */
.btn {
  margin:10px;
  padding:14px 24px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#a855f7,#ec4899,#38bdf8);
  color:white;
  animation:pulse 2s infinite;
}

.btn:hover { transform:scale(1.05); }

@keyframes pulse {
  0% { box-shadow:0 0 10px rgba(168,85,247,0.5); }
  50% { box-shadow:0 0 25px rgba(56,189,248,0.8); }
  100% { box-shadow:0 0 10px rgba(168,85,247,0.5); }
}

/* WALLET INFO */
.wallet {
  margin-top:15px;
  font-size:14px;
  opacity:.8;
}

/* PROGRESS BAR */
.progress-container {
  margin-top:30px;
  width:80%;
  margin-left:auto;
  margin-right:auto;
}

.progress-bar {
  height:20px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  width:0%;
  background:linear-gradient(135deg,#38bdf8,#a855f7);
}
</style>
</head>

<body>

<div class="container">

  <div class="monet">Monet Money</div>

  <p>Make money moves by trading.</p>

  <button class="btn" onclick="buyToken()">Make Money Moves</button>
  <button class="btn" onclick="claimAirdrop()">Get Free MONET</button>

  <div class="wallet" id="walletInfo">Not connected</div>

  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="progressText">Loading airdrop data...</div>
  </div>

</div>

<script>
const CONTRACT = "6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b";
const API = "https://monetmoney-production.up.railway.app/airdrop";

/* BUY */
function buyToken() {
  window.open(`https://jup.ag/swap/SOL-${CONTRACT}`, "_blank");
}

/* CONNECT */
async function connectWallet() {
  const resp = await window.solana.connect();
  return resp.publicKey.toString();
}

/* CLAIM AIRDROP */
async function claimAirdrop() {
  try {
    if (!window.solana) return alert("Install Phantom");

    const wallet = await connectWallet();

    document.getElementById("walletInfo").innerText = wallet;

    const message = new TextEncoder().encode("Claim MONET airdrop");
    const signed = await window.solana.signMessage(message);

    const signature = window.bs58.encode(signed.signature);

    const res = await fetch(API, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ wallet, signature })
    });

    const text = await res.text();

    alert(text);

  } catch (err) {
    console.error(err);
    alert("Airdrop failed");
  }
}

/* FAKE PROGRESS (until backend endpoint added) */
let progress = 0;
setInterval(() => {
  progress += Math.random()*2;
  if (progress > 100) progress = 100;

  document.getElementById("progressFill").style.width = progress + "%";
  document.getElementById("progressText").innerText =
    Math.floor(progress*100000) + " / 10,000,000 MONET claimed";
}, 2000);
</script>

</body>
</html>
