<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Better Have My Monet</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
<script src="https://unpkg.com/@solana/spl-token@latest/lib/index.iife.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0b0b0f,#1a1a2e);
  color:white;
}

.section {
  padding:60px 20px;
  text-align:center;
}

.hero img {
  max-width:160px;
  margin-bottom:20px;
}

h1 { font-size:34px; }

button {
  padding:14px 26px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  background:#00ffcc;
  color:black;
  cursor:pointer;
}

button:hover { transform:scale(1.05); }

.card {
  background:#141428;
  padding:20px;
  border-radius:16px;
  margin:20px auto;
  max-width:500px;
}

img.section-img {
  max-width:220px;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="section hero">
  <img src="assets/monet-hero.png" onerror="this.style.display='none'">
  <h1>💸 Better Have My Monet</h1>
  <p>Money moves powered by MONET</p>

  <button onclick="connectWallet()">Connect Wallet</button>
  <button onclick="payMonet()">Play & Earn MONET</button>
</div>

<!-- GAME SECTION -->
<div class="section">
  <div class="card">
    <h2>🎮 Play & Earn</h2>
    <p>Pay 1 MONET to start the game</p>
    <img src="assets/game-preview.png" class="section-img" onerror="this.style.display='none'">
  </div>
</div>

<!-- CHART SECTION -->
<div class="section">
  <div class="card">
    <h2>📊 Token Chart</h2>
    <p>Track MONET performance</p>
    <img src="assets/chart.png" class="section-img" onerror="this.style.display='none'">
  </div>
</div>

<!-- COMMUNITY -->
<div class="section">
  <div class="card">
    <h2>💬 Join the Movement</h2>
    <p>Stay connected with MONET</p>
    <button onclick="window.open('https://t.me/Libra_Token_Solana')">Join Telegram</button>
  </div>
</div>

<script>
let wallet = null;

const MONET_MINT = "6eACLGXCGdw9D5zb5eBKyFnFNTX9pTihDEpZQ7gYAX1b";
const RECEIVER = "2H5yp77LMdAqo8er1znx2jRApyCPExcHVpZPYHKkD68F";
const DECIMALS = 1000000000;

async function connectWallet() {
  if (window.solana && window.solana.isPhantom) {
    wallet = await window.solana.connect();
    alert("Connected: " + wallet.publicKey.toString());
  } else {
    alert("Install Phantom Wallet");
  }
}

async function payMonet() {
  if (!wallet) return alert("Connect wallet first");

  const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

  const from = wallet.publicKey;
  const mint = new solanaWeb3.PublicKey(MONET_MINT);
  const to = new solanaWeb3.PublicKey(RECEIVER);

  const fromATA = await splToken.getAssociatedTokenAddress(mint, from);
  const toATA = await splToken.getAssociatedTokenAddress(mint, to);

  const balance = await connection.getTokenAccountBalance(fromATA).catch(()=>null);

  if (!balance || balance.value.uiAmount < 1) {
    return alert("You need at least 1 MONET 💸");
  }

  const tx = new solanaWeb3.Transaction();

  const toAccount = await connection.getAccountInfo(toATA);
  if (!toAccount) {
    tx.add(
      splToken.createAssociatedTokenAccountInstruction(
        from,
        toATA,
        to,
        mint
      )
    );
  }

  tx.add(
    splToken.createTransferInstruction(
      fromATA,
      toATA,
      from,
      DECIMALS
    )
  );

  tx.feePayer = from;
  tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;

  const signed = await window.solana.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  alert("1 MONET sent 🚀\nTX: " + sig);

  startGame();
}

function startGame() {
  alert("Game starting 🎮");
}
</script>

</body>
</html>
